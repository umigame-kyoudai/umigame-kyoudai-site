<style>
  :root {
    --navy: #073b4c;
    --navy-deep: #042d3b;
    --navy-soft: #0c4f62;
    --sea: #0f8b8d;
    --sea-soft: #d9f0ed;
    --aqua: #63c6bc;
    --sand: #f5f1e8;
    --paper: #fffdf9;
    --white: #ffffff;
    --ink: #183238;
    --muted: #687c80;
    --line: #dce5e2;
    --yellow: #f1b24a;
    --yellow-soft: #fff4d8;
    --red: #cf5a55;
    --red-soft: #fbe8e6;
    --green: #2f8f72;
    --green-soft: #e3f4ed;
    --shadow: 0 18px 50px rgba(8, 54, 67, 0.10);
    --shadow-soft: 0 8px 24px rgba(8, 54, 67, 0.08);
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  html { min-height: 100%; background: var(--sand); }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background:
      radial-gradient(circle at 86% 4%, rgba(99, 198, 188, 0.14), transparent 26rem),
      var(--sand);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  button, input, select, textarea { font: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: wait; opacity: .58; }
  [hidden] { display: none !important; }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .app-shell { min-height: 100vh; }

  .sidebar {
    position: fixed;
    inset: 0 auto 0 0;
    z-index: 20;
    width: 236px;
    padding: 28px 20px;
    color: #fff;
    background:
      linear-gradient(155deg, rgba(255,255,255,.04), transparent 40%),
      var(--navy-deep);
    display: flex;
    flex-direction: column;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 8px 30px;
  }

  .brand-mark {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border-radius: 14px;
    font-size: 25px;
    background: rgba(255,255,255,.12);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
  }

  .brand-name { font-size: 18px; font-weight: 800; letter-spacing: .04em; }
  .brand-sub { margin-top: 3px; color: rgba(255,255,255,.55); font-size: 10px; letter-spacing: .16em; }

  .side-nav { display: grid; gap: 8px; }

  .nav-item {
    width: 100%;
    border: 0;
    border-radius: 12px;
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,.68);
    background: transparent;
    text-align: left;
    font-size: 14px;
    font-weight: 700;
    transition: .18s ease;
  }

  .nav-item > span:first-child {
    width: 25px;
    height: 25px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    color: var(--aqua);
    background: rgba(99,198,188,.10);
  }

  .nav-item:hover { color: #fff; background: rgba(255,255,255,.06); }
  .nav-item.is-active { color: #fff; background: rgba(99,198,188,.15); }

  .sidebar-note {
    margin-top: auto;
    padding: 14px;
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 14px;
    background: rgba(255,255,255,.04);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .safe-dot {
    width: 9px;
    height: 9px;
    margin-top: 5px;
    flex: 0 0 auto;
    border-radius: 50%;
    background: #70dbc3;
    box-shadow: 0 0 0 5px rgba(112,219,195,.1);
  }

  .sidebar-note strong { display: block; font-size: 12px; }
  .sidebar-note span { display: block; margin-top: 4px; color: rgba(255,255,255,.55); font-size: 10px; line-height: 1.5; }

  .main-content { min-height: 100vh; margin-left: 236px; }

  .topbar {
    min-height: 112px;
    padding: 27px clamp(24px, 4vw, 54px) 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(7,59,76,.08);
    background: rgba(245,241,232,.82);
    backdrop-filter: blur(14px);
    position: sticky;
    top: 0;
    z-index: 12;
  }

  .eyebrow, .panel-kicker {
    margin: 0 0 7px;
    color: var(--sea);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .17em;
  }

  h1, h2, h3, p { margin-top: 0; }
  h1 { margin-bottom: 0; font-size: 26px; letter-spacing: .02em; }
  h2 { margin-bottom: 0; font-size: 20px; }

  .topbar-actions { display: flex; align-items: center; gap: 12px; }

  .sync-state {
    min-height: 36px;
    padding: 8px 12px;
    border: 1px solid rgba(7,59,76,.10);
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    background: rgba(255,255,255,.56);
    font-size: 11px;
    font-weight: 700;
  }

  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .sync-state.is-loading .sync-dot { background: var(--yellow); animation: pulse 1.1s infinite; }
  .sync-state.is-error .sync-dot { background: var(--red); }

  .icon-button, .drawer-close {
    width: 40px;
    height: 40px;
    border: 1px solid rgba(7,59,76,.11);
    border-radius: 12px;
    color: var(--navy);
    background: rgba(255,255,255,.72);
    font-size: 22px;
    line-height: 1;
    transition: .18s ease;
  }

  .icon-button:hover, .drawer-close:hover { transform: translateY(-1px); background: #fff; }

  .content-wrap { padding: 28px clamp(20px, 4vw, 54px) 60px; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .summary-card {
    position: relative;
    min-height: 126px;
    padding: 20px;
    overflow: hidden;
    border: 1px solid rgba(7,59,76,.08);
    border-radius: var(--radius);
    background: rgba(255,253,249,.92);
    box-shadow: var(--shadow-soft);
  }

  .summary-card::after {
    content: "";
    position: absolute;
    right: -18px;
    bottom: -25px;
    width: 86px;
    height: 86px;
    border-radius: 50%;
    background: var(--card-soft, var(--sea-soft));
  }

  .summary-label { color: var(--muted); font-size: 12px; font-weight: 700; }
  .summary-value { margin-top: 13px; font-size: 30px; font-weight: 850; letter-spacing: -.03em; }
  .summary-value.is-compact { font-size: 25px; white-space: nowrap; letter-spacing: -.05em; }
  .summary-note { margin-top: 4px; color: var(--muted); font-size: 10px; }
  .summary-icon {
    position: absolute;
    z-index: 1;
    right: 17px;
    bottom: 14px;
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 12px;
    color: var(--card-color, var(--sea));
    background: rgba(255,255,255,.76);
    font-weight: 900;
  }

  .attention-banner {
    margin-bottom: 20px;
    padding: 16px 18px;
    border: 1px solid #efdba5;
    border-radius: 15px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--yellow-soft);
  }

  .attention-icon {
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    border-radius: 10px;
    color: #8a5a06;
    background: #ffdf8b;
    font-weight: 900;
  }

  .attention-banner strong { font-size: 13px; }
  .attention-banner p { margin: 3px 0 0; color: #79602d; font-size: 11px; }
  .text-button { margin-left: auto; border: 0; color: #744d08; background: transparent; font-size: 12px; font-weight: 800; }

  .panel {
    border: 1px solid rgba(7,59,76,.08);
    border-radius: 22px;
    background: rgba(255,253,249,.96);
    box-shadow: var(--shadow);
  }

  .panel-header {
    padding: 22px 24px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .result-count {
    padding: 7px 11px;
    border-radius: 999px;
    color: var(--sea);
    background: var(--sea-soft);
    font-size: 11px;
    font-weight: 800;
  }

  .filters { padding: 0 24px 20px; }

  .search-field {
    min-height: 45px;
    padding: 0 14px;
    border: 1px solid var(--line);
    border-radius: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
  }

  .search-field > span { color: var(--sea); font-size: 22px; transform: translateY(-1px); }
  .search-field input { width: 100%; border: 0; outline: none; color: var(--ink); background: transparent; font-size: 13px; }
  .search-field input::placeholder { color: #9aa9aa; }

  .filter-row {
    margin-top: 11px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .filter-row label { min-width: 135px; display: grid; gap: 5px; }
  .filter-row label > span { padding-left: 3px; color: var(--muted); font-size: 9px; font-weight: 800; letter-spacing: .08em; }

  select, .field-input, .message-compose {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 11px;
    color: var(--ink);
    background: #fff;
    outline: none;
  }

  select { height: 38px; padding: 0 33px 0 11px; font-size: 12px; }
  select:focus, .field-input:focus, .message-compose:focus { border-color: var(--sea); box-shadow: 0 0 0 3px rgba(15,139,141,.10); }

  .filter-reset {
    height: 38px;
    margin-left: auto;
    padding: 0 12px;
    border: 0;
    color: var(--muted);
    background: transparent;
    font-size: 11px;
    font-weight: 700;
  }

  .table-wrap { border-top: 1px solid var(--line); overflow: hidden; border-radius: 0 0 22px 22px; }
  .reservation-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .reservation-table th { padding: 13px 12px; color: #7d8e90; background: #f8faf8; text-align: left; font-size: 9px; letter-spacing: .08em; }
  .reservation-table th:first-child, .reservation-table td:first-child { padding-left: 24px; width: 14%; }
  .reservation-table th:nth-child(2) { width: 15%; }
  .reservation-table th:nth-child(3) { width: 21%; }
  .reservation-table th:nth-child(4) { width: 9%; }
  .reservation-table th:nth-child(5) { width: 14%; }
  .reservation-table th:nth-child(6) { width: 10%; }
  .reservation-table th:nth-child(7) { width: 10%; }
  .reservation-table th:last-child { width: 5%; }
  .reservation-table td { padding: 15px 12px; border-top: 1px solid #edf1ef; vertical-align: middle; font-size: 12px; }
  .reservation-table tbody tr { transition: background .15s ease; }
  .reservation-table tbody tr:hover { background: #f9fcfa; }

  .date-main { display: block; font-weight: 850; }
  .date-sub, .customer-sub, .plan-sub { display: block; margin-top: 4px; color: var(--muted); font-size: 9px; }
  .customer-name { font-weight: 800; }
  .plan-name { display: -webkit-box; overflow: hidden; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.5; }
  .number-cell { text-align: right !important; font-variant-numeric: tabular-nums; }
  td.number-cell { font-weight: 800; }

  .status-chip {
    display: inline-flex;
    min-height: 26px;
    padding: 5px 9px;
    border-radius: 999px;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 850;
    white-space: nowrap;
  }

  .status-confirmed { color: #24725d; background: var(--green-soft); }
  .status-full { color: #a33f3a; background: var(--red-soft); }
  .status-pending, .status-mixed { color: #8a5a06; background: var(--yellow-soft); }
  .location-text, .staff-text { color: #4f676b; font-size: 11px; line-height: 1.45; }

  .row-open {
    width: 31px;
    height: 31px;
    border: 0;
    border-radius: 10px;
    color: var(--sea);
    background: var(--sea-soft);
    font-weight: 900;
  }

  .mobile-list { display: none; }

  .empty-state { padding: 58px 20px; text-align: center; color: var(--muted); }
  .empty-icon { width: 48px; height: 48px; margin: 0 auto 13px; display: grid; place-items: center; border-radius: 16px; background: var(--sea-soft); color: var(--sea); font-weight: 900; }
  .empty-state strong { color: var(--ink); font-size: 14px; }
  .empty-state p { margin: 6px 0 0; font-size: 11px; }

  .drawer-backdrop {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(4,31,40,.34);
    backdrop-filter: blur(2px);
  }

  .detail-drawer {
    position: fixed;
    inset: 0 0 0 auto;
    z-index: 51;
    width: min(620px, 94vw);
    background: var(--paper);
    box-shadow: -24px 0 80px rgba(4,31,40,.20);
    transform: translateX(102%);
    transition: transform .24s ease;
    display: flex;
    flex-direction: column;
  }

  .detail-drawer.is-open { transform: translateX(0); }
  .drawer-header { min-height: 94px; padding: 22px 25px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .drawer-body { padding: 22px 25px 48px; overflow-y: auto; }

  .detail-hero {
    padding: 20px;
    border-radius: 18px;
    color: #fff;
    background: linear-gradient(135deg, var(--navy), var(--navy-soft));
  }

  .detail-hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  .detail-number { color: rgba(255,255,255,.6); font-size: 10px; letter-spacing: .08em; }
  .detail-plan { margin: 8px 0 0; font-size: 15px; font-weight: 800; line-height: 1.55; }
  .detail-datetime { margin-top: 17px; display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: baseline; }
  .detail-datetime strong { font-size: 21px; }
  .detail-datetime span { color: rgba(255,255,255,.75); font-size: 12px; }

  .schedule-editor {
    margin-top: 15px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #fff;
    overflow: hidden;
  }

  .schedule-editor summary {
    min-height: 58px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    list-style: none;
    color: var(--navy);
    background: #f7faf8;
    cursor: pointer;
  }

  .schedule-editor summary::-webkit-details-marker { display: none; }
  .schedule-editor summary strong { display: block; font-size: 12px; }
  .schedule-editor summary small { display: block; margin-top: 4px; color: var(--muted); font-size: 9px; }
  .schedule-editor summary > span:last-child { color: var(--sea); font-size: 24px; transition: transform .18s ease; }
  .schedule-editor[open] summary > span:last-child { transform: rotate(90deg); }

  .schedule-editor-body { padding: 16px; border-top: 1px solid var(--line); }
  .schedule-help { margin: 0 0 14px; color: #526a6e; font-size: 10px; line-height: 1.65; }
  .schedule-date-field, .schedule-time-field { display: grid; gap: 6px; }
  .schedule-date-field > span, .schedule-time-field > span { color: var(--muted); font-size: 9px; font-weight: 800; line-height: 1.45; }
  .schedule-component-grid { display: grid; gap: 10px; }
  .schedule-component-edit { padding: 13px; border: 1px solid var(--line); border-radius: 13px; background: #fbfcfb; }
  .schedule-component-name { color: var(--navy); font-size: 11px; font-weight: 850; line-height: 1.5; }
  .schedule-component-name small { display: block; margin-top: 3px; color: var(--sea); font-size: 9px; font-weight: 700; }
  .schedule-component-fields { margin-top: 10px; display: grid; grid-template-columns: 1.25fr 1fr; gap: 9px; }
  .schedule-time-field input:disabled { color: #5d7073; background: #edf3f1; opacity: 1; }
  .schedule-date-field input:disabled { color: #5d7073; background: #edf3f1; opacity: 1; }
  .schedule-save { width: 100%; margin-top: 14px; }

  .schedule-editor.is-locked { padding: 14px 16px; background: #f4f7f4; }
  .schedule-editor.is-locked .schedule-editor-title { font-size: 11px; font-weight: 850; }
  .schedule-editor.is-locked p { margin: 5px 0 0; color: var(--muted); font-size: 9px; line-height: 1.6; }

  .quick-status {
    margin-top: 15px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #fff;
  }

  .section-title { margin: 0 0 12px; font-size: 12px; font-weight: 850; letter-spacing: .03em; }
  .status-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .status-choice {
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 11px;
    color: var(--ink);
    background: #fff;
    font-size: 11px;
    font-weight: 800;
  }

  .status-choice:hover { border-color: var(--sea); }
  .status-choice.is-current { border-color: var(--sea); color: var(--sea); background: var(--sea-soft); }

  .detail-grid {
    margin-top: 15px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .info-card { min-height: 82px; padding: 14px; border: 1px solid var(--line); border-radius: 14px; background: #fff; }
  .info-label { color: var(--muted); font-size: 9px; font-weight: 800; letter-spacing: .06em; }
  .info-value { margin-top: 7px; font-size: 12px; font-weight: 750; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

  .detail-section { margin-top: 24px; }

  .component-card {
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #fff;
  }

  .component-card + .component-card { margin-top: 10px; }
  .component-head { display: flex; justify-content: space-between; gap: 12px; }
  .component-plan { font-size: 12px; font-weight: 850; line-height: 1.45; }
  .component-time { margin-top: 4px; color: var(--sea); font-size: 11px; font-weight: 800; }
  .component-price { white-space: nowrap; font-size: 12px; font-weight: 850; }

  .component-fields { margin-top: 13px; display: grid; grid-template-columns: 1.35fr 1fr auto; gap: 8px; align-items: end; }
  .mini-field { display: grid; gap: 5px; }
  .mini-field > span { color: var(--muted); font-size: 9px; font-weight: 800; }
  .field-input { height: 38px; padding: 0 10px; font-size: 12px; }
  .save-component { height: 38px; padding: 0 13px; border: 0; border-radius: 11px; color: #fff; background: var(--navy); font-size: 11px; font-weight: 800; }

  .participants-box { padding: 14px; border-radius: 14px; background: #f4f7f4; color: #455f63; font-size: 11px; line-height: 1.8; white-space: pre-wrap; }

  .message-compose { min-height: 120px; padding: 12px; resize: vertical; font-size: 12px; line-height: 1.7; }

  .primary-button, .secondary-button {
    min-height: 43px;
    padding: 0 17px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 850;
  }

  .primary-button { border: 0; color: #fff; background: var(--sea); box-shadow: 0 8px 20px rgba(15,139,141,.20); }
  .secondary-button { border: 1px solid var(--line); color: var(--ink); background: #fff; }
  .message-action { width: 100%; margin-top: 9px; }

  .line-state {
    margin-top: 13px;
    padding: 12px 13px;
    border-radius: 12px;
    color: #526a6e;
    background: #f4f7f4;
    font-size: 10px;
    line-height: 1.6;
  }

  .history-list { display: grid; gap: 8px; }
  .history-item { padding: 12px; border: 1px solid var(--line); border-radius: 13px; background: #fff; }
  .history-head { display: flex; justify-content: space-between; gap: 10px; font-size: 10px; }
  .history-type { font-weight: 800; }
  .history-date { color: var(--muted); }
  .history-message { margin: 7px 0 0; color: #526a6e; font-size: 10px; line-height: 1.55; white-space: pre-wrap; max-height: 72px; overflow: hidden; }
  .history-empty { padding: 18px; border-radius: 13px; background: #f4f7f4; color: var(--muted); text-align: center; font-size: 10px; }

  .danger-zone {
    padding: 16px;
    border: 1px solid #efc9c6;
    border-radius: 16px;
    background: #fff8f7;
  }

  .danger-zone .section-title { color: #9f403c; }
  .danger-zone p { margin: 0; color: #805653; font-size: 10px; line-height: 1.7; }

  .delete-booking-button {
    width: 100%;
    min-height: 43px;
    margin-top: 12px;
    border: 1px solid #d77a75;
    border-radius: 12px;
    color: #a33f3a;
    background: #fff;
    font-size: 12px;
    font-weight: 850;
  }

  .delete-booking-button:hover { color: #fff; background: var(--red); }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 80;
    padding: 24px;
    display: grid;
    place-items: center;
    background: rgba(4,31,40,.52);
    backdrop-filter: blur(5px);
  }

  .modal-card {
    width: min(650px, 100%);
    max-height: calc(100vh - 48px);
    padding: 23px;
    border-radius: 20px;
    background: var(--paper);
    box-shadow: 0 30px 100px rgba(4,31,40,.28);
    overflow: auto;
  }

  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; }

  .send-warning {
    margin-top: 17px;
    padding: 13px;
    border: 1px solid #efdba5;
    border-radius: 13px;
    display: flex;
    gap: 11px;
